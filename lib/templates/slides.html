<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.min.css" integrity="sha384-wabY5HaRAmr9Hp+sfT5cYy8q4IEH8pbJUUxI0Xbntt1buEogDFE7ZxNoFvnznxBt" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.min.css" integrity="sha384-oWyxxY8CC40FK/4yBNc3yWhSVsZU6TiI3nzyiU/3ZtQdIiKsuminc3NfjMQ0kysp" crossorigin="anonymous">
  <style>
    :root {
      --r-background-color: #0f1117;
      --r-main-font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      --r-heading-font: var(--r-main-font);
      --r-main-color: #e2e6f0;
      --r-heading-color: #e2e6f0;
      --r-link-color: #4f8ef7;
      --r-link-color-hover: #7cb0ff;
      --r-selection-background-color: rgba(79,142,247,0.3);
    }

    .reveal { font-size: 28px; }
    .reveal h1 { font-size: 2em; font-weight: 700; letter-spacing: -0.5px; }
    .reveal h2 { font-size: 1.5em; font-weight: 700; color: #4f8ef7; }
    .reveal h3 { font-size: 1.2em; font-weight: 600; }

    .reveal .subtitle { color: #8b92a9; font-size: 0.7em; margin-top: 0.5em; }
    .reveal .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.5em; background: rgba(79,142,247,0.15); color: #4f8ef7; border: 1px solid rgba(79,142,247,0.3); }

    .reveal table { font-size: 0.65em; border-collapse: collapse; width: 100%; margin: 0.5em 0; }
    .reveal table th { background: #1a1d27; color: #8b92a9; padding: 8px 12px; text-align: left; font-weight: 600; text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.5px; }
    .reveal table td { padding: 8px 12px; border-bottom: 1px solid #2e3347; }
    .reveal table tr:hover td { background: rgba(255,255,255,0.02); }

    .reveal .insight { text-align: left; border-left: 3px solid #4f8ef7; padding: 12px 16px; background: rgba(79,142,247,0.06); border-radius: 0 8px 8px 0; margin: 0.5em 0; font-size: 0.75em; }
    .reveal .insight.green { border-color: #00c9a7; background: rgba(0,201,167,0.06); }
    .reveal .insight.purple { border-color: #7c4dff; background: rgba(124,77,255,0.06); }
    .reveal .insight.red { border-color: #ff6b6b; background: rgba(255,107,107,0.06); }

    .reveal .card { text-align: left; background: #1a1d27; border: 1px solid #2e3347; border-radius: 10px; padding: 16px 20px; margin: 0.3em 0; font-size: 0.7em; }

    .reveal .sources { text-align: left; font-size: 0.5em; color: #5a6078; columns: 2; column-gap: 2em; }
    .reveal .sources a { color: #4f8ef7; }

    .reveal .footer-slide { color: #5a6078; font-size: 0.6em; }
    .reveal .footer-slide strong { color: #8b92a9; }

    .reveal aside.notes { display: none; }
  </style>
</head>
<body>

<div class="reveal">
  <div class="slides">
{{BODY}}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.min.js" integrity="sha384-NUUZ9hV+/mdEjMRZxfJCJAnNMKzCWUV3tHSsfcuz4kRJvmSJ2SsqMVQoA/dzoi2B" crossorigin="anonymous"></script>
<script>
  Reveal.initialize({
    hash: true,
    slideNumber: true,
    transition: 'fade',
    backgroundTransition: 'fade'
  });
</script>

</body>
</html>
