# AutoSearch v2 — E2B validation matrix
# Run via: ~/.claude/scripts/e2b/.venv/bin/python ~/.claude/scripts/e2b/run_validation.py \
#   --project autosearch --matrix tests/e2b/matrix.yaml --secrets ~/.config/ai-secrets.env \
#   --output reports/{date}/ --tarball /tmp/autosearch-src.tar.gz --parallel 20
#
# Source tar built locally before run:
#   tar --exclude='.git' --exclude='node_modules' --exclude='.venv' \
#       --exclude='__pycache__' --exclude='.pytest_cache' --exclude='*.egg-info' \
#       -czf /tmp/autosearch-src.tar.gz -C ~/Projects/autosearch .

phases:

  # F002 S0 — CLI help/version smokes
  F002_S0_help_smokes:
    parallel: 1
    timeout: 600
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e . > /tmp/install.log 2>&1
    tasks:
      - id: version
        cmd: $HOME/work/autosearch/.venv/bin/autosearch --version
        expect:
          exit: 0
          stdout_regex: "^[0-9]{4}\\.[0-9]{1,2}\\.[0-9]{1,2}\\.[0-9]+"
      - id: top_help
        cmd: $HOME/work/autosearch/.venv/bin/autosearch --help
        expect:
          exit: 0
          stdout_contains: "query"
      - id: query_help
        cmd: $HOME/work/autosearch/.venv/bin/autosearch query --help
        expect:
          exit: 0
          stdout_contains: "--mode"
      - id: init_help
        cmd: $HOME/work/autosearch/.venv/bin/autosearch init --help
        expect:
          exit: 0
          stdout_contains: "overwrite"
      - id: doctor_runs
        timeout: 60
        cmd: $HOME/work/autosearch/.venv/bin/autosearch doctor
        expect:
          exit: 0
          stdout_contains: "开箱即用"
      - id: doctor_json
        timeout: 60
        cmd: $HOME/work/autosearch/.venv/bin/autosearch doctor --json
        expect:
          exit: 0
          stdout_regex: '"channel":\s*"[a-z0-9_]+"'
      - id: mcp_check_passes
        timeout: 60
        cmd: $HOME/work/autosearch/.venv/bin/autosearch mcp-check
        expect:
          exit: 0
          stdout_contains: "OK: all 10 required tools registered"
      - id: unknown_cmd_rejected
        cmd: |
          $HOME/work/autosearch/.venv/bin/autosearch doctor-nonexistent 2>&1 | tail -5 || true
        expect:
          exit: 0
          stdout_contains: "No such command"

  # F002 S1 — Fresh dev install end-to-end
  F002_S1_dev_install:
    parallel: 1
    timeout: 600
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    tasks:
      - id: full_install
        timeout: 480
        cmd: |
          set -e
          mkdir -p $HOME/work/autosearch
          tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
          curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
          cd $HOME/work/autosearch
          $HOME/.local/bin/uv venv --python 3.12 .venv
          $HOME/.local/bin/uv pip install --python .venv/bin/python -e .
          .venv/bin/autosearch --version
        expect:
          exit: 0
          stdout_regex: "^[0-9]{4}\\.[0-9]{1,2}\\.[0-9]{1,2}\\.[0-9]+"

  # F002 S2 — autosearch init probes 3 LLM providers
  F002_S2_init_probe_3_providers:
    parallel: 1
    timeout: 600
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e . > /tmp/install.log 2>&1
    tasks:
      - id: init_with_3_keys
        env_keys: [ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY]
        cmd: $HOME/work/autosearch/.venv/bin/autosearch init
        expect:
          exit: 0
      - id: config_yaml_exists
        cmd: ls -la $HOME/.autosearch/config.yaml && cat $HOME/.autosearch/config.yaml
        expect:
          exit: 0
          stdout_contains: "llm:"
      - id: anthropic_detected
        env_keys: [ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY]
        cmd: cat $HOME/.autosearch/config.yaml
        expect:
          exit: 0
          stdout_regex: "anthropic:\\s*true"

  # F003 — pytest 4-tier in cloud
  F003_pytest_cloud:
    parallel: 1
    timeout: 1200
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e ".[dev]" > /tmp/install.log 2>&1 || \
        $HOME/.local/bin/uv pip install --python .venv/bin/python -e . > /tmp/install.log 2>&1
      $HOME/.local/bin/uv pip install --python .venv/bin/python pytest pytest-asyncio ruff > /tmp/install-test.log 2>&1
    tasks:
      - id: pytest_default
        timeout: 300
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/python -m pytest -m "not real_llm and not perf and not slow and not network" -q --tb=line 2>&1 | tail -30
        expect:
          exit: 0
          stdout_regex: "passed"
      - id: pytest_smoke
        timeout: 180
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/python -m pytest -m smoke -q --tb=line 2>&1 | tail -30
        expect:
          exit: 0
          stdout_regex: "passed"
      - id: pytest_real_llm
        timeout: 600
        env_keys: [ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY]
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/python -m pytest -m real_llm -q --tb=line 2>&1 | tail -50
        expect:
          exit: 0
      - id: ruff_check
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/ruff check . 2>&1 | tail -10
        expect:
          exit: 0
      - id: ruff_format_check
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/ruff format --check . 2>&1 | tail -10
        expect:
          exit: 0

  # F004 S1 — CLI matrix (specific unambiguous queries to avoid needs_clarification exit 2)
  F004_S1_cli_matrix:
    parallel: 1
    timeout: 1800
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e . > /tmp/install.log 2>&1
    tasks:
      # v2 contract: `autosearch query` is deprecated. Pin the deprecation
      # message + non-zero exit so a future regression that resurrects the v1
      # path (or removes the deprecation hint) is caught.
      - id: query_subcommand_is_deprecated
        timeout: 60
        cmd: |
          $HOME/work/autosearch/.venv/bin/autosearch query "smoke test" --no-stream 2>&1 | tail -5
        expect:
          exit_nonzero: true
          stdout_contains: "deprecated"
      # v2 happy path: real users invoke run_channel via MCP. Hits a free
      # channel (no LLM key required) so it runs in any sandbox.
      - id: mcp_run_channel_real_evidence
        timeout: 90
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/python <<'PY'
          import asyncio
          from autosearch.mcp.server import create_server
          server = create_server()
          result = asyncio.run(server.call_tool(
              "run_channel",
              {"channel_name": "ddgs", "query": "BM25 ranking function"},
          ))
          payload = str(result)
          assert len(payload) > 50, f"empty result: {payload!r}"
          print("mcp_run_channel_evidence_ok")
          PY
        expect:
          exit: 0
          stdout_contains: "mcp_run_channel_evidence_ok"

  # F004 S2 — MCP stdio: verify server starts and tools/list returns expected tools
  F004_S2_mcp_stdio:
    parallel: 1
    timeout: 300
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e . > /tmp/install.log 2>&1
    tasks:
      - id: mcp_tools_list
        timeout: 60
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/python -c "
          import asyncio
          from autosearch.mcp.server import create_server
          server = create_server()
          tools = asyncio.run(server.list_tools())
          names = [t.name for t in tools]
          print('tools=', names)
          required = {'run_channel', 'list_skills', 'run_clarify'}
          missing = required - set(names)
          assert not missing, f'missing tools: {missing}'
          print(f'mcp_tools_ok count={len(names)}')
          "
        expect:
          exit: 0
          stdout_contains: "mcp_tools_ok"
      - id: mcp_run_channel_ddgs
        timeout: 60
        cmd: |
          cd $HOME/work/autosearch
          .venv/bin/python -c "
          import asyncio
          from autosearch.mcp.server import create_server
          server = create_server()
          result = asyncio.run(server.call_tool('run_channel', {'channel_name': 'ddgs', 'query': 'BM25 ranking algorithm'}))
          content = str(result)
          print('preview=', content[:200])
          assert len(content) > 10, f'empty result from run_channel: {content}'
          print('mcp_run_channel_ok')
          "
        expect:
          exit: 0
          stdout_contains: "mcp_run_channel_ok"

  # F004 S3 — OpenAI SDK strict schema
  F004_S3_openai_sdk_compat:
    parallel: 1
    timeout: 600
    setup_env_keys: [ANTHROPIC_API_KEY]
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e . openai > /tmp/install.log 2>&1
      nohup $HOME/work/autosearch/.venv/bin/autosearch serve --host 127.0.0.1 --port 18081 > /tmp/serve.log 2>&1 &
      echo $! > /tmp/serve.pid
      for i in $(seq 1 30); do curl -sf http://127.0.0.1:18081/health > /dev/null && break; sleep 1; done
    tasks:
      - id: openai_sdk_chat
        timeout: 900
        cmd: |
          $HOME/work/autosearch/.venv/bin/python <<'PY'
          from openai import OpenAI
          c = OpenAI(base_url="http://127.0.0.1:18081/v1", api_key="dummy")
          r = c.chat.completions.create(
              model="autosearch",
              messages=[{"role": "user", "content": "Explain dense retrieval with sentence-transformers"}],
              stream=False,
          )
          assert r.choices[0].message.content, "empty content"
          assert r.usage.prompt_tokens >= 0
          assert r.usage.completion_tokens >= 0
          print("schema_ok")
          md = r.model_dump().get("metadata") or {}
          print("visitedURLs_present:", "visitedURLs" in md)
          print("reasoning_content_present:", "reasoning_content" in md)
          PY
        expect:
          exit: 0
          stdout_contains: "schema_ok"
      - id: shutdown
        cmd: kill -TERM $(cat /tmp/serve.pid) || true; sleep 1; echo done
        expect:
          exit: 0

  # F004 S4 — MCP stdio (env explicitly forwarded to subprocess)
  F004_S4_mcp_stdio:
    parallel: 1
    timeout: 600
    upload:
      - src: /tmp/autosearch-src.tar.gz
        dst: /tmp/autosearch-src.tar.gz
    setup: |
      set -e
      mkdir -p $HOME/work/autosearch
      tar -xzf /tmp/autosearch-src.tar.gz -C $HOME/work/autosearch
      curl -LsSf https://astral.sh/uv/install.sh | sh > /dev/null 2>&1
      cd $HOME/work/autosearch
      $HOME/.local/bin/uv venv --python 3.12 .venv
      $HOME/.local/bin/uv pip install --python .venv/bin/python -e . mcp > /tmp/install.log 2>&1
    tasks:
      - id: mcp_handshake_and_v2_tools
        timeout: 120
        cmd: |
          $HOME/work/autosearch/.venv/bin/python <<'PY'
          import asyncio, os
          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client

          # v2 contract: handshake + list_tools must surface the required v2
          # surface; doctor + run_channel must work over stdio without an LLM
          # key. The deprecated `research` tool is intentionally NOT asserted.
          REQUIRED = {
              "list_skills", "run_clarify", "run_channel", "list_channels",
              "doctor", "select_channels_tool", "delegate_subtask",
              "citation_create", "citation_add", "citation_export",
          }

          async def main():
              params = StdioServerParameters(
                  command=os.path.expanduser("~/work/autosearch/.venv/bin/autosearch-mcp"),
                  args=[],
                  env={"PATH": os.environ.get("PATH", "")},
              )
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      listed = await session.list_tools()
                      tool_names = {t.name for t in listed.tools}
                      missing = REQUIRED - tool_names
                      assert not missing, f"missing v2 tools over stdio: {missing}"

                      doctor_resp = await session.call_tool("doctor", {})
                      doctor_text = "".join(getattr(c, "text", "") for c in doctor_resp.content)
                      assert "channel" in doctor_text.lower(), f"doctor returned no channel info: {doctor_text[:200]}"

                      rc_resp = await session.call_tool(
                          "run_channel", {"channel_name": "ddgs", "query": "BM25 ranking"}
                      )
                      rc_text = "".join(getattr(c, "text", "") for c in rc_resp.content)
                      assert len(rc_text) > 50, f"empty run_channel result: {rc_text!r}"

                      print("mcp_v2_stdio_ok")

          asyncio.run(main())
          PY
        expect:
          exit: 0
          stdout_contains: "mcp_v2_stdio_ok"

  # F005 — 4 LLM provider true validation
  # Note: claude_code (no claude CLI in default template) + gemini (GOOGLE_API_KEY missing in secrets)
  # auto-skip via pytest's available-provider detection. anthropic + openai run for real.
  F005_provider_spike1:
