name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I often need to search X but AutoSearch doesn't support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Add a new channel for X that uses the Y API..."
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New channel
        - New skill
        - Improvement to existing feature
        - Documentation
        - Other
    validations:
      required: true
