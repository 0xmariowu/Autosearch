name: Public Repo Hygiene

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Check author emails in PR commits
        if: github.event_name == 'pull_request'
        run: |
          BAD=$(git log --format='%ae' origin/main..HEAD \
            | grep -v '@users.noreply.github.com' \
            | grep -v 'github-actions' \
            | grep -v 'dependabot' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Non-noreply author emails: $BAD"
            exit 1
          fi

      - name: Check author names in PR commits
        if: github.event_name == 'pull_request'
        run: |
          BAD=$(git log --format='%an' origin/main..HEAD \
            | grep -v '0xmariowu' \
            | grep -v 'github-actions' \
            | grep -v 'dependabot' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Non-pseudonym author names: $BAD"
            exit 1
          fi

      - name: Check internal codenames
        run: |
          MATCHES=$(grep -rn '\b\(Armory\|AIMD\|atoms\|kalami\|alaya.os\)\b' \
            --include='*.py' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.toml' --include='*.sh' \
            --exclude-dir='.git' --exclude='.gitleaks.toml' \
            --exclude='.husky/pre-commit' --exclude='CLAUDE.md' \
            --exclude='hygiene.yml' . || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Internal project codenames found:"
            echo "$MATCHES"
            exit 1
          fi

      - name: Check personal paths and hostnames
        run: |
          MATCHES=$(grep -rn '/Users/[a-zA-Z]\|/home/[a-z]\|\.ts\.net' \
            --include='*.py' --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.toml' --include='*.sh' \
            --exclude-dir='.git' --exclude='.gitleaks.toml' \
            --exclude='.husky/pre-commit' . || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Personal paths or hostnames found:"
            echo "$MATCHES"
            exit 1
          fi

      - name: Check container image pins
        run: |
          UNPINNED=$(grep -rn '^\s*image:' .github/workflows/ \
            | grep -v '@sha256:' || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Unpinned container images:"
            echo "$UNPINNED"
            exit 1
          fi

      - name: Verify pyright config targets real directories
        run: |
          python3 -c "
          import json, os, sys
          config = json.load(open('pyrightconfig.json'))
          includes = config.get('include', [])
          if not includes:
              print('::error::pyrightconfig.json has no include paths')
              sys.exit(1)
          for d in includes:
              if not os.path.isdir(d):
                  print(f'::error::pyrightconfig.json includes nonexistent directory: {d}')
                  sys.exit(1)
          print(f'pyright includes {len(includes)} valid directories: {includes}')
          "
