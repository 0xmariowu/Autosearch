# Self-written, plan v2.3 § 13.5 (v2 release pipeline)
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.0.1a1`).
# Replaces the v1 CalVer/npm pipeline — v2 ships via pipx/PyPI.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      npm_version: ${{ steps.npm-version.outputs.npm_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Resolve tag and version
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$REF_NAME"
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Verify tag matches pyproject version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PY_VERSION" != "$VERSION" ]; then
            echo "::error::tag $TAG implies version $VERSION but pyproject.toml is $PY_VERSION"
            exit 1
          fi
          echo "Verified: pyproject.toml version = $VERSION"

      - name: Verify all version files agree (pyproject + plugin + marketplace + CHANGELOG + npm)
        run: python scripts/validate/check_version_consistency.py

      - name: Install autosearch (for release-gate CLI surface checks)
        run: pip install -e ".[dev]"

      - name: Run release-gate.sh --quick (version + lint + CLI surface)
        run: bash scripts/release-gate.sh --quick

      - name: Install build backend
        run: pip install --upgrade "build>=1.2" "twine>=6.1" "setuptools>=80"

      - name: Build sdist + wheel
        run: python -m build

      - name: Check wheel metadata
        run: twine check dist/*

      - name: Derive npm version
        id: npm-version
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Single source of truth for the pyproject→npm mapping lives in
          # scripts/validate/check_version_consistency.py:derive_npm_version
          # so workflow summaries and publishes cannot drift.
          NPM_VERSION=$(python - <<'PY'
          import importlib.util
          import os

          spec = importlib.util.spec_from_file_location(
              "cv", "scripts/validate/check_version_consistency.py"
          )
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print(mod.derive_npm_version(os.environ["VERSION"]))
          PY
          )
          echo "npm_version=$NPM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload Python distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist

      - name: Require PyPI token
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "::error::PYPI_API_TOKEN secret is required; refusing split npm-only release."
            exit 1
          fi

      - name: Install twine
        run: python -m pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*

  create-github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "AutoSearch $TAG" \
              --generate-notes \
              dist/*
          fi

  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, publish-pypi]
    if: needs.publish-pypi.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.build.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm wrapper
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          NPM_VERSION: ${{ needs.build.outputs.npm_version }}
        run: |
          # Intra-day pyproject bumps (YYYY.MM.DD.1 → YYYY.MM.DD.2) map to the
          # same npm version. The npm tarball only depends on the base date,
          # so if it's already published we skip rather than fail the whole
          # release workflow.
          PUBLISHED=$(npm view "autosearch-ai@$NPM_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$NPM_VERSION" ]; then
            echo "npm already has autosearch-ai@$NPM_VERSION — skipping (intra-day pyproject bump, nothing new to publish)"
            exit 0
          fi
          echo "Publishing autosearch-ai@$NPM_VERSION (derived from $VERSION)"
          cd npm
          npm version "$NPM_VERSION" --no-git-tag-version --allow-same-version
          npm publish --access public

  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, publish-pypi, create-github-release, publish-npm]
    if: needs.publish-pypi.result == 'success' && needs.publish-npm.result == 'success' && needs.create-github-release.result == 'success'
    permissions: {}
    steps:
      - name: Summary
        env:
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
          NPM_VERSION: ${{ needs.build.outputs.npm_version }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## Released $VERSION"
            echo "- GitHub Release: $SERVER_URL/$REPO/releases/tag/$TAG"
            echo "- PyPI: https://pypi.org/project/autosearch/$VERSION/"
            echo "- npm: https://www.npmjs.com/package/autosearch-ai/v/$NPM_VERSION"
          } >> "$GITHUB_STEP_SUMMARY"
