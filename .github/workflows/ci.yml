name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-asyncio ruff -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check
        run: |
          pip install pyright
          pyright
        continue-on-error: true

      - name: Test
        run: pytest -x -q -m "not network"

  integration:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run setup.sh
        run: bash scripts/setup.sh

      - name: Verify venv
        run: |
          ~/.autosearch/venv/bin/python -c "import ddgs; import httpx; print('Dependencies OK')"

      - name: Verify channel loading
        run: |
          PYTHONPATH=. ~/.autosearch/venv/bin/python -c "
          from channels import load_channels
          ch = load_channels()
          print(f'{len(ch)} channels loaded')
          assert len(ch) >= 30, f'Expected >= 30, got {len(ch)}'
          print('Channel loading OK')
          "

      - name: Verify search execution
        run: |
          RESULT=$(PYTHONPATH=. bash scripts/run_search.sh '[{"channel":"web-ddgs","query":"test","max_results":1}]' 2>/dev/null | head -1)
          echo "$RESULT"
          echo "$RESULT" | python3 -c "
          import sys, json
          r = json.loads(sys.stdin.readline())
          assert 'url' in r, 'Missing url'
          assert 'title' in r, 'Missing title'
          assert 'snippet' in r, 'Missing snippet'
          print('Search execution OK')
          "

      - name: Verify plugin structure
        run: |
          test -f .claude-plugin/plugin.json && echo "plugin.json OK"
          test -f commands/autosearch.md && echo "commands/autosearch.md OK"
          test -f commands/setup.md && echo "commands/setup.md OK"
          test -f agents/researcher.md && echo "agents/researcher.md OK"
          test -f PROTOCOL.md && echo "PROTOCOL.md OK"
          test -f lib/search_runner.py && echo "search_runner.py OK"
          test -f lib/judge.py && echo "judge.py OK"
          test -d channels && echo "channels/ OK"
          test -d skills && echo "skills/ OK"
          test -d state && echo "state/ OK"
          echo "Plugin structure OK"

  quality:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflows
        uses: raven-actions/actionlint@v2

      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ADDITIONS=$(gh pr view "$PR_NUMBER" --json additions -q '.additions')
          DELETIONS=$(gh pr view "$PR_NUMBER" --json deletions -q '.deletions')
          TOTAL=$((ADDITIONS + DELETIONS))
          if [ "$TOTAL" -gt 500 ]; then
            gh pr comment "$PR_NUMBER" --body "**PR size warning**: This PR changes $TOTAL lines (+$ADDITIONS/-$DELETIONS). Consider splitting."
          fi
