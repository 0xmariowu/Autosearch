name: E2B Nightly Validation

on:
  schedule:
    # 07:00 UTC daily
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install orchestrator deps
        run: |
          uv venv --python 3.12 .orchestrator
          uv pip install --python .orchestrator/bin/python \
            e2b e2b-code-interpreter rich pyyaml
          uv pip install --python .orchestrator/bin/python -e .

      - name: Pack source tarball
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.venv' \
              --exclude='__pycache__' --exclude='.pytest_cache' \
              --exclude='*.egg-info' --exclude='reports' --exclude='build' \
              --exclude='.ruff_cache' --exclude='.orchestrator' \
              -czf /tmp/autosearch-src.tar.gz -C "$GITHUB_WORKSPACE" .

      - name: Run E2B nightly matrix (Track A core)
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
        run: |
          # Write secrets file for orchestrator
          cat > /tmp/nightly-secrets.env <<EOF
          E2B_API_KEY=${E2B_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
          TIKHUB_API_KEY=${TIKHUB_API_KEY}
          EOF
          if [ ! -f scripts/e2b/run_validation.py ]; then
            echo "::warning::nightly orchestrator not yet ported to repo; skipping"
            exit 0
          fi
          report_dir="reports/nightly-$(date -u +%Y-%m-%d)"
          .orchestrator/bin/python scripts/e2b/run_validation.py \
            --project autosearch \
            --matrix tests/e2b/matrix.yaml \
            --secrets /tmp/nightly-secrets.env \
            --output "${report_dir}" \
            --parallel 15 \
            --tarball /tmp/autosearch-src.tar.gz

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2b-nightly-report
          path: reports/nightly-*/**
          retention-days: 14

      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "E2B nightly validation failed ${{ github.run_number }}"
          content-filepath: reports/nightly-*/summary.md
          labels: ci,nightly-fail
