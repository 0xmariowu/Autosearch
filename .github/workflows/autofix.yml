name: autofix.ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff auto-fix
        run: ruff check --fix . || true

      - name: Ruff auto-format
        run: ruff format . || true

      - uses: autofix-ci/action@v1
