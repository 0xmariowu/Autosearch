# .gitleaks.toml — PII + internal reference detection for public repos

title = "PII + Internal Reference Ruleset"

[extend]
useDefault = true

# ── Always-block rules ───────────────────────────────────────────────────────

[[rules]]
id = "personal-path"
description = "Personal home directory path leaked"
regex = '''/Users/[a-zA-Z0-9_\-\.]+/|/home/[a-z][a-z0-9_\-]+/'''
tags = ["pii", "personal-path"]
keywords = ["/Users/", "/home/"]

[[rules]]
id = "tailscale-domain"
description = "Tailscale network address or internal hostname leaked"
regex = '''[a-z0-9\-]+\.ts\.net|\.local\b'''
tags = ["pii", "hostname"]
keywords = [".ts.net", ".local"]

  [[rules.allowlists]]
  description = "DemoChannel placeholder URLs — RFC-safe example domain"
  paths = ['''autosearch/channels/demo\.py$''']

  [[rules.allowlists]]
  description = "E2B matrix + bench scripts reference $HOME/.local/bin/uv (Linux XDG path, not a Tailscale domain)"
  paths = ['''tests/e2b/matrix\.yaml$''', '''scripts/e2b/.*\.py$''']
  regexes = ['''\$HOME/\.local/bin/uv''']

  [[rules.allowlists]]
  description = "SKILL.md + ops docs reference .local paths (Linux XDG, not a Tailscale domain)"
  paths = ['''skills/.*/SKILL\.md$''', '''docs/.*\.md$''']
  regexes = ['''\.local/''']

# ── Public-repo-only rules ───────────────────────────────────────────────────

[[rules]]
id = "internal-project-name"
description = "Internal project codename leaked (Armory/AIMD/atoms/kalami/alaya-os)"
regex = '''\b(Armory|AIMD|atoms|kalami2?|alaya[_\-]os)\b'''
tags = ["pii", "internal-codename"]
keywords = ["Armory", "AIMD", "atoms", "kalami", "alaya"]

# ── Public-repo-hygiene rules (per public-repo-hygiene-plan F010) ────────────

[[rules]]
id = "dangerous-permission-flag"
description = "Use of `dangerously-skip-permissions` (Claude Code permission bypass)"
regex = '''dangerously-skip-permissions'''
tags = ["hygiene", "internal-flag"]
keywords = ["dangerously"]

[[rules]]
id = "handoff-file"
description = "Reference to HANDOFF.md (internal session-handoff state)"
regex = '''\bHANDOFF\.md\b'''
tags = ["hygiene", "handoff"]
keywords = ["HANDOFF"]

[[rules]]
id = "internal-plan-dir"
description = "Reference to internal plan / proposal / spike / channel-hunt / exec-plan directory paths"
regex = '''docs/(plans|proposals|spikes|channel-hunt|exec-plans)/'''
tags = ["hygiene", "internal-plan"]
keywords = ["docs/plans", "docs/proposals", "docs/spikes", "docs/channel-hunt", "docs/exec-plans"]

[[rules]]
id = "runtime-experience-jsonl"
description = "Runtime experience JSONL files should never be tracked (patterns-jsonl)"
regex = '''experience/patterns\.jsonl'''
tags = ["hygiene", "runtime-experience"]
keywords = ["patterns.jsonl"]

# ── Allowlist ────────────────────────────────────────────────────────────────

[allowlist]
description = "Project-level allowlist"
paths = [
  '''\.gitleaks\.toml$''',
  '''channels/youtube/search\.py$''',
  '''\.github/workflows/hygiene\.yml$''',
  '''\.husky/pre-commit$''',
]
regexes = [
  '''innertube''',
]
